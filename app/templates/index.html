<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HL7 to FHIR Converter</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-mesh"></div>
    
    <div class="app-container">
        <header class="app-header">
            <div class="logo-container">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <h1>HL7 to FHIR Converter</h1>
            </div>
            <p>Seamlessly transform your legacy HL7 v2 messages into modern FHIR resources.</p>
        </header>

        <main class="main-content">
            <div class="panels-container">
                <!-- Input Panel -->
                <section class="panel glass-panel input-panel">
                    <h2>Input Source</h2>
                    
                    <form id="convert-form">
                        <div class="input-group">
                            <label for="hl7_text">Paste HL7 Message(s)</label>
                            <textarea id="hl7_text" name="hl7_text" placeholder="MSH|^~\&|...\nPID|...\nPV1|..." rows="8"></textarea>
                        </div>
                        
                        <div class="divider">
                            <span>OR</span>
                        </div>
                        
                        <div class="input-group">
                            <label for="file_upload" class="file-drop-area">
                                <span class="drop-icon">📁</span>
                                <span class="drop-text">Choose files or drag & drop</span>
                                <span class="drop-hint">Supports .hl7, .txt (Multiple allowed)</span>
                                <input type="file" id="file_upload" name="files" accept=".hl7,.txt" multiple>
                            </label>
                            <div id="file_list" class="file-list"></div>
                        </div>

                        <button type="submit" class="btn-primary" id="convert-btn">
                            <span class="btn-text">Convert to FHIR</span>
                            <span class="btn-loader" style="display: none;"></span>
                        </button>
                    </form>
                </section>

                <!-- Output Panel -->
                <section class="panel glass-panel output-panel">
                    <div class="output-header">
                        <h2>FHIR Output</h2>
                        <div class="view-toggle" id="view-toggle" style="display: none;">
                            <button class="toggle-btn active" data-view="json">JSON</button>
                            <button class="toggle-btn" data-view="xml">XML</button>
                        </div>
                        <div class="header-actions">
                            <button id="copy-btn" class="btn-icon" title="Copy JSON" disabled>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            </button>
                            <button id="download-json-btn" class="btn-secondary" title="Download JSON" disabled>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                                JSON
                            </button>
                            <button id="download-xml-btn" class="btn-secondary" title="Download XML" disabled>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                                XML
                            </button>
                            <button id="download-pdf-btn" class="btn-secondary" title="Download Human Readable PDF" disabled>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                                PDF
                            </button>
                        </div>
                    </div>
                    
                    <div class="output-container" id="output-container">
                        <div class="placeholder-state" id="output-empty-state">
                            <div class="placeholder-icon">⚛️</div>
                            <p>Converted FHIR resources will appear here.</p>
                        </div>
                        <pre id="json-output"></pre>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="/static/script.js?v=4"></script>
</body>
</html>
